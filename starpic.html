<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Silhouette Demo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a; /* Diepzwarte ruimte achtergrond */
            font-family: sans-serif;
        }

        /* Canvas vult de hele achtergrond */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Jouw content komt hieroverheen te staan */
        .content {
            position: relative;
            z-index: 2;
            color: white;
            padding: 4rem;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
        }

        p {
            color: #a0a0c0;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- De content aan de linkerkant -->
    <div class="content">
        <h1>Every journey begins with a single light in the dark.</h1>
        <p>As a realistic optimist the glass will always be 50% air and 50% water. But by working hard and adapting the universe might bless you with a full beer.</p>
    </div>

    <!-- Het canvas waar de deeltjes op getekend worden -->
    <canvas id="particle-canvas"></canvas>

    <!-- Three.js bibliotheek laden via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Scene, Camera en Renderer opzetten
        const canvas = document.getElementById('particle-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // 2. Duizenden deeltjes (particles) aanmaken in goud en blauw
        const particleCount = 4000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const colorGold = new THREE.Color('#ffaa33'); // Warm goud/oranje
        const colorBlue = new THREE.Color('#3388ff'); // Felblauw

        for (let i = 0; i < particleCount * 3; i += 3) {
            // We creëren een globaal silhouet-achtige vorm (een ovale / menselijke cluster rechts in beeld)
            const u = Math.random();
            const v = Math.random();
            
            // Positie coördinaten rechts op het scherm
            const x = (Math.random() - 0.5) * 2 + 1.8; 
            const y = (Math.random() - 0.5) * 3.5;
            const z = (Math.random() - 0.5) * 1;

            positions[i]     = x;
            positions[i + 1] = y;
            positions[i + 2] = z;

            // Kleuren verdelen over de deeltjes
            const mixedColor = Math.random() > 0.4 ? colorGold : colorBlue;
            colors[i]     = mixedColor.r;
            colors[i + 1] = mixedColor.g;
            colors[i + 2] = mixedColor.b;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Materiaal voor de deeltjes (maakt ze mooie kleine lichtcirkels)
        const material = new THREE.PointsMaterial({
            size: 0.035,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // 3. Animatie-loop zodat de deeltjes subtiel bewegen
        function animate() {
            requestAnimationFrame(animate);

            // Laat de deeltjeswolk heel langzaam op en neer / ronddraaien voor een levendig effect
            particleSystem.rotation.y += 0.002;
            particleSystem.rotation.x = Math.sin(Date.now() * 0.001) * 0.05;

            renderer.render(scene, camera);
        }

        animate();

        // Responsive maken als het scherm van grootte verandert
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
