<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact — Mars</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/contact.css">
</head>
<body>
<a href="index.html" class="site-logo" aria-label="Home">
  <img src="img/logo.svg" alt="SK logo">
</a>

<a class="back-link" href="index.html">← back to the solar system</a>

<div class="page-content">
  <div class="inner">
    <h2>Transmission Console</h2>
    <p class="content-lede">
      Contact me for any available missions or task.
    </p>

    <div class="console-grid">
      <form id="contact-form" class="console-form" novalidate>
        <div class="console-field">
          <label for="cf-name">Callsign <span class="req">*</span></label>
          <input type="text" id="cf-name" name="name" placeholder="Your name" required>
        </div>
        <div class="console-field">
          <label for="cf-email">Return Frequency <span class="req">*</span></label>
          <input type="email" id="cf-email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="console-field">
          <label for="cf-message">Transmission <span class="req">*</span></label>
          <textarea id="cf-message" name="message" rows="5" placeholder="What's on your mind?" required></textarea>
        </div>
        <button type="submit" class="console-submit"><span>Send Transmission</span></button>
        <p class="console-status" id="cf-status" role="status" aria-live="polite"></p>
      </form>

      <div class="direct-channels">
        <p class="channels-label">Direct Channels</p>
        <a class="channel-card" href="mailto:you@example.com">
          <span class="channel-coord">EMAIL</span>
          <span class="channel-value">kempesshaquille015@gmail.com</span>
        </a>
        <a class="channel-card" href="https://linkedin.com/in/yourname" target="_blank" rel="noopener">
          <span class="channel-coord">LINKEDIN</span>
          <span class="channel-value">https://www.linkedin.com/in/shaquille-kempes-b862b9355/</span>
        </a>
        <a class="channel-card" href="https://github.com/yourname" target="_blank" rel="noopener">
          <span class="channel-coord">GITHUB</span>
          <span class="channel-value">https://github.com/SKempes/</span>
        </a>
      </div>
    </div>

    <p class="signal-note">Transmission response might differ</p>
  </div>
</div>

<section class="planet-showcase">
  <div class="full-planet mars"></div>
  <p class="planet-showcase-name">Mars</p>
</section>

<script src="js/main.js"></script>
<script src="js/contact.js"></script>
</body>
</html>
